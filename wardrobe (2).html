<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="我的小衣櫃"/>
<meta name="theme-color" content="#6cb8f0"/>
<title>我的小衣櫃</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
:root{--blue:#6cb8f0;--blue2:#b0dcf8;--text:#2a5a80;--muted:#7badd0;--hint:#9cc4e0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:linear-gradient(155deg,#d6ecff 0%,#eef7ff 35%,#fde8f4 80%,#fff0f8 100%);min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom));}
button,input,select{font-family:inherit;}
/* Layout */
#app{max-width:480px;margin:0 auto;}
.header{text-align:center;padding:calc(env(safe-area-inset-top,12px) + 24px) 20px 16px;}
.header h1{font-size:27px;font-weight:900;color:#2a6a9a;}
.header p{color:var(--hint);font-size:13px;margin-top:5px;font-weight:600;}
.px{padding:0 16px;}
/* Tabs */
.tab-bar{display:flex;background:rgba(255,255,255,.72);border-radius:20px;overflow:hidden;box-shadow:0 2px 16px rgba(108,184,240,.15);margin:0 16px 18px;}
.tab-btn{flex:1;padding:14px 0;background:none;border:none;font-size:14px;font-weight:800;color:#a0c8e8;cursor:pointer;position:relative;}
.tab-btn.on{color:#3a8fd0;}
.tab-btn.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:36px;height:3px;background:var(--blue);border-radius:10px;}
/* Chips */
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{display:inline-block;border-radius:50px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none;}
.chip.on{background:var(--blue);color:#fff;}
.chip.off{background:rgba(255,255,255,.8);color:var(--muted);border-color:#cce5f8;}
/* Filter chips scroll */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:16px;}
.item-card{background:rgba(255,255,255,.85);border-radius:18px;border:2.5px solid transparent;transition:all .18s;cursor:pointer;overflow:hidden;}
.item-card.sel{border-color:var(--blue);box-shadow:0 6px 20px rgba(108,184,240,.28);}
.photo-box{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;}
.photo-box img{width:100%;height:100%;object-fit:cover;}
.ph-inner{display:flex;flex-direction:column;align-items:center;gap:5px;}
.ph-label{font-size:10px;font-weight:800;color:#a0b8cc;}
.card-info{padding:9px 10px 11px;}
.card-name{font-size:12px;font-weight:800;color:#2a5a80;line-height:1.3;margin-bottom:2px;}
.card-sub{font-size:11px;color:var(--hint);font-weight:600;}
.color-dot-sm{position:absolute;top:7px;right:7px;width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.12);}
/* Add tile */
.add-tile{border:2.5px dashed #c0dff5;background:rgba(200,228,248,.1);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;aspect-ratio:3/4;transition:all .15s;}
.add-tile:active{background:rgba(108,184,240,.1);}
.add-plus{font-size:26px;color:#9dd0f8;line-height:1;}
.add-label{font-size:12px;color:#9dd0f8;font-weight:800;margin-top:5px;}
/* Detail card */
.detail-card{background:rgba(255,255,255,.82);border-radius:20px;box-shadow:0 4px 24px rgba(108,184,240,.14);padding:18px;margin-bottom:16px;}
.detail-row{display:flex;gap:14px;align-items:flex-start;}
.detail-thumb{width:76px;height:100px;border-radius:14px;overflow:hidden;background:linear-gradient(145deg,#eaf5ff,#f0e8f8);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#c0d8f0;}
.detail-thumb img{width:100%;height:100%;object-fit:cover;}
.detail-name{font-weight:900;color:#1a4a70;font-size:16px;margin-bottom:6px;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.tag{background:#e8f4ff;color:#4a9dd8;font-size:11px;font-weight:800;border-radius:50px;padding:3px 10px;}
.color-row{display:flex;align-items:center;gap:7px;}
.color-swatch{width:14px;height:14px;border-radius:50%;border:2px solid #eee;}
.color-name{font-size:12px;color:var(--muted);font-weight:600;}
.btn-row{display:flex;gap:9px;margin-top:14px;}
.btn-photo{background:rgba(108,184,240,.15);color:#3a8fd0;border:none;border-radius:50px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-del{background:rgba(255,220,235,.9);color:#e04480;border:none;border-radius:50px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;}
/* Card section label */
.section-label{font-size:12.5px;color:var(--muted);font-weight:800;display:block;margin-bottom:7px;}
.section-label span{color:#b0d0e8;font-weight:600;}
/* Outfit tab */
.outfit-pref{background:rgba(255,255,255,.82);border-radius:20px;box-shadow:0 4px 24px rgba(108,184,240,.14);padding:20px;margin-bottom:16px;}
.outfit-pref-title{font-weight:900;color:#2a6a9a;font-size:15px;margin-bottom:14px;}
.pref-row{margin-bottom:13px;}
.match-btn{width:100%;padding:14px;background:linear-gradient(130deg,#6cb8f0,#b0dcf8);color:white;font-size:15px;font-weight:800;border:none;border-radius:50px;cursor:pointer;box-shadow:0 5px 18px rgba(108,184,240,.36);margin-top:4px;}
.match-btn:active{transform:scale(.97);}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.result-title{font-weight:900;color:#2a6a9a;font-size:15px;}
.swap-btn{background:rgba(108,184,240,.13);color:#4a9dd8;border:2px solid #cce5f8;border-radius:50px;padding:7px 15px;font-size:13px;font-weight:700;cursor:pointer;}
.outfit-rows{display:flex;flex-direction:column;gap:9px;}
.outfit-row{background:rgba(255,255,255,.88);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:13px;box-shadow:0 2px 10px rgba(108,184,240,.1);}
.o-img{width:50px;height:65px;border-radius:11px;object-fit:cover;flex-shrink:0;}
.o-ph{width:50px;height:65px;border-radius:11px;background:linear-gradient(145deg,#eaf5ff,#f0e8f8);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#c0d8f0;}
.o-cat{font-size:11px;color:var(--hint);font-weight:800;margin-bottom:2px;}
.o-name{font-size:14px;font-weight:800;color:#1a4a70;}
.o-sub{font-size:12px;color:#a0c4de;margin-top:2px;font-weight:600;}
.o-dot{width:13px;height:13px;border-radius:50%;border:2px solid #eee;flex-shrink:0;}
.empty-state{text-align:center;padding:48px 20px;}
.empty-icon{margin-bottom:14px;color:#cce0f0;}
.empty-title{font-weight:800;font-size:15px;color:#a0c4de;}
.empty-sub{font-size:13px;color:#b8d4e8;margin-top:5px;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(140,200,240,.22);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:white;border-radius:30px 30px 0 0;padding:26px 20px;padding-bottom:calc(32px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:19px;font-weight:900;color:#2a6a9a;}
.modal-close{background:#f0e8f5;border:none;border-radius:50%;width:33px;height:33px;font-size:16px;cursor:pointer;color:#b080c8;}
.field{margin-bottom:13px;}
input[type=text]{border:2px solid #cce5f8;border-radius:13px;padding:11px 14px;font-size:14px;color:var(--text);background:white;width:100%;outline:none;}
input[type=text]:focus{border-color:var(--blue);}
/* Upload zone */
.upload-zone{border:2.5px dashed #aad5f5;border-radius:16px;background:rgba(210,240,255,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;padding:26px 20px;text-align:center;}
.upload-zone.drag{border-color:var(--blue);background:rgba(108,184,240,.1);}
.upload-title{font-weight:800;color:var(--muted);font-size:14px;}
.upload-sub{font-size:12px;color:#a8c8e0;}
.preview-wrap{position:relative;}
.preview-wrap img{width:100%;max-height:210px;object-fit:cover;border-radius:14px;display:block;}
.preview-rm{position:absolute;top:9px;right:9px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:29px;height:29px;cursor:pointer;font-size:14px;box-shadow:0 2px 7px rgba(0,0,0,.12);}
.preview-change{position:absolute;bottom:9px;right:9px;background:rgba(108,184,240,.9);color:white;border:none;border-radius:50px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;}
/* Color picker */
.color-dots{display:flex;gap:8px;flex-wrap:wrap;}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .12s;flex-shrink:0;}
.cdot.sel{outline:3px solid var(--blue);outline-offset:2px;transform:scale(1.1);}
/* Add btn */
.add-btn{width:100%;padding:14px;background:linear-gradient(130deg,#6cb8f0,#b0dcf8);color:white;font-size:15px;font-weight:800;border:none;border-radius:50px;cursor:pointer;box-shadow:0 5px 18px rgba(108,184,240,.34);}
.add-btn:active{transform:scale(.97);}
/* hide file inputs */
input[type=file]{display:none;}
/* fade */
.fade{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>我的小衣櫃 ✿</h1>
    <p id="count-label">收藏了 0 件衣物</p>
  </div>
  <div class="tab-bar">
    <button class="tab-btn on" data-tab="wardrobe" onclick="switchTab('wardrobe')">衣物管理</button>
    <button class="tab-btn" data-tab="outfit" onclick="switchTab('outfit')">今日搭配</button>
  </div>
  <div id="tab-wardrobe" class="px">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="grid" id="clothes-grid"></div>
    <div id="detail-panel"></div>
  </div>
  <div id="tab-outfit" class="px" style="display:none"></div>
</div>

<!-- Add modal -->
<div id="modal" class="modal-bg" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">新增衣物</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="field">
      <label class="section-label">衣物照片</label>
      <div id="upload-area">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-new').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#a8d0f0" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <div class="upload-title">點擊或拖曳上傳照片</div>
          <div class="upload-sub">支援 JPG、PNG、HEIC</div>
        </div>
      </div>
      <input type="file" id="file-new" accept="image/*" onchange="onNewFileChange(event)"/>
    </div>
    <div class="field">
      <label class="section-label">衣物名稱</label>
      <input type="text" id="new-name" placeholder="例如：白色棉質T恤"/>
    </div>
    <div class="field">
      <label class="section-label">類別</label>
      <div class="chips" id="new-cat-chips"></div>
    </div>
    <div class="field">
      <label class="section-label">主色調 — <span id="new-color-label" style="color:#4a9dd8">白</span></label>
      <div class="color-dots" id="new-color-dots"></div>
    </div>
    <div class="field">
      <label class="section-label">季節 <span>（可多選）</span></label>
      <div class="chips" id="new-season-chips"></div>
    </div>
    <div class="field" style="margin-bottom:20px">
      <label class="section-label">風格 <span>（可多選）</span></label>
      <div class="chips" id="new-style-chips"></div>
    </div>
    <button class="add-btn" onclick="addItem()">加入我的衣櫃</button>
  </div>
</div>

<!-- Edit photo input -->
<input type="file" id="file-edit" accept="image/*" onchange="onEditFileChange(event)"/>

<script>
const CATS=['上衣','下裝','外套','洋裝','鞋子','配件'];
const COLORS=['白','黑','灰','米','藍','粉','綠','紅','黃','紫','咖','橘'];
const COLOR_HEX={白:'#f5f5f0',黑:'#2a2a2a',灰:'#b0b0b0',米:'#e8dcc8',藍:'#89b4e8',粉:'#f4a8c0',綠:'#90d4a0',紅:'#e88080',黃:'#f0d878',紫:'#c0a0e0',咖:'#b8906a',橘:'#f0b070'};
const SEASONS=['春','夏','秋','冬','四季'];
const STYLES=['休閒','正式','可愛','運動','文青','甜美'];
const CAT_SVG={
  上衣:'<path d="M12 4c-1.1 0-2.2.5-2.8 1.4L4.5 9.5V20h15V9.5l-4.7-4.1C14.2 4.5 13.1 4 12 4zM9 9.5h6"/>',
  下裝:'<path d="M6.5 4l2 8.5h7l2-8.5M8.5 13v7h7v-7"/>',
  外套:'<path d="M12 4L9 7H4.5v13h15V7H15l-3-3zM9.5 7v13M14.5 7v13"/>',
  洋裝:'<path d="M12 4c-1.3 0-2.6.7-3.2 1.8L5.5 10v10h13V10l-3.3-4.2C14.6 4.7 13.3 4 12 4z"/>',
  鞋子:'<path d="M3.5 16c0-2 1.5-3.5 3.5-4.5l4.5-1h7v4H7c-1 0-2 .6-2 1.8v.7h-1.5v-.7z"/>',
  配件:'<path d="M12 4a4.5 4.5 0 110 9 4.5 4.5 0 010-9zM7.5 17h9v3h-9z"/>'
};
const SAMPLE=[
  {id:1,name:'白色棉質T恤',category:'上衣',color:'白',seasons:['四季'],styles:['休閒'],image:null},
  {id:2,name:'淺藍牛仔褲',category:'下裝',color:'藍',seasons:['四季'],styles:['休閒'],image:null},
  {id:3,name:'粉色針織外套',category:'外套',color:'粉',seasons:['春'],styles:['甜美'],image:null},
  {id:4,name:'碎花洋裝',category:'洋裝',color:'粉',seasons:['夏'],styles:['可愛'],image:null},
  {id:5,name:'白色小圓鞋',category:'鞋子',color:'白',seasons:['四季'],styles:['休閒'],image:null},
  {id:6,name:'藍色托特包',category:'配件',color:'藍',seasons:['四季'],styles:['休閒'],image:null},
];

// State
let clothes=[], nextId=10, selectedId=null, filterCat='全部';
let newItem={name:'',category:'上衣',color:'白',seasons:[],styles:[],image:null};
let outfitStyles=['休閒'], outfitSeason='四季', currentOutfit=null;
let currentTab='wardrobe';

// Storage
function save(){try{localStorage.setItem('wardrobe-v3',JSON.stringify({clothes,nextId}));}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem('wardrobe-v3');
    if(d){const p=JSON.parse(d);clothes=p.clothes||SAMPLE;nextId=p.nextId||10;}
    else clothes=[...SAMPLE];
  }catch(e){clothes=[...SAMPLE];}
}

function icon(cat,size){return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">${CAT_SVG[cat]||CAT_SVG['上衣']}</svg>`;}

// Render
function render(){
  document.getElementById('count-label').textContent=`收藏了 ${clothes.length} 件衣物`;
  if(currentTab==='wardrobe') renderWardrobe();
  else renderOutfit();
}

function renderWardrobe(){
  // Filter bar
  const fb=document.getElementById('filter-bar');
  fb.innerHTML=['全部',...CATS].map(c=>`<span class="chip ${filterCat===c?'on':'off'}" onclick="setFilter('${c}')">${c}</span>`).join('');
  // Grid
  const filtered=filterCat==='全部'?clothes:clothes.filter(c=>c.category===filterCat);
  const grid=document.getElementById('clothes-grid');
  grid.innerHTML=filtered.map(item=>{
    const bg=item.image?'':`background:linear-gradient(160deg,${COLOR_HEX[item.color]}99,${COLOR_HEX[item.color]}44);`;
    const iconColor=COLOR_HEX[item.color]==='#f5f5f0'?'#c0d0e0':COLOR_HEX[item.color];
    const imgHtml=item.image
      ?`<img src="${item.image}" alt="${item.name}"/>`
      :`<div class="ph-inner"><div style="color:${iconColor};filter:saturate(.7) brightness(.75);opacity:.85">${icon(item.category,40)}</div><div class="ph-label">點擊上傳</div></div>`;
    return `<div class="item-card${selectedId===item.id?' sel':''}" onclick="selectItem(${item.id})">
      <div class="photo-box" style="${bg}" onclick="event.stopPropagation();triggerCardUpload(${item.id})">
        ${imgHtml}
        ${item.image?`<div style="position:absolute;inset:0;background:rgba(108,184,240,0);display:flex;align-items:center;justify-content:center;transition:background .2s;" onmouseover="this.style.background='rgba(108,184,240,0.28)'" onmouseout="this.style.background='rgba(108,184,240,0)'"><span style="background:rgba(0,0,0,.4);color:white;font-size:11px;font-weight:800;border-radius:50px;padding:4px 11px;opacity:0;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">換圖</span></div>`:''}
        <div class="color-dot-sm" style="background:${COLOR_HEX[item.color]}"></div>
      </div>
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <div class="card-sub">${(item.seasons||[]).join('、')} · ${(item.styles||[]).join('、')}</div>
      </div>
    </div>`;
  }).join('');
  grid.innerHTML+=`<div class="add-tile" onclick="openModal()"><div class="add-plus">+</div><div class="add-label">新增衣物</div></div>`;
  renderDetail();
}

function renderDetail(){
  const panel=document.getElementById('detail-panel');
  if(!selectedId){panel.innerHTML='';return;}
  const item=clothes.find(c=>c.id===selectedId);
  if(!item){panel.innerHTML='';return;}
  const thumbHtml=item.image?`<img src="${item.image}" alt=""/>`:`<div style="color:#c0d8f0">${icon(item.category,36)}</div>`;
  const tags=[item.category,...(item.seasons||[]),...(item.styles||[])].map(t=>`<span class="tag">${t}</span>`).join('');
  panel.innerHTML=`<div class="detail-card fade">
    <div class="detail-row">
      <div class="detail-thumb">${thumbHtml}</div>
      <div style="flex:1">
        <div class="detail-name">${item.name}</div>
        <div class="tags">${tags}</div>
        <div class="color-row"><div class="color-swatch" style="background:${COLOR_HEX[item.color]}"></div><span class="color-name">${item.color}色</span></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-photo" onclick="document.getElementById('file-edit').click()">更換照片</button>
      <button class="btn-del" onclick="deleteItem(${item.id})">刪除衣物</button>
    </div>
  </div>`;
}

function renderOutfit(){
  const el=document.getElementById('tab-outfit');
  const styleChips=STYLES.map(s=>{const a=outfitStyles.includes(s);return`<span class="chip ${a?'on':'off'}" onclick="toggleOutfitStyle('${s}')">${a?'✓ ':''}${s}</span>`;}).join('');
  const seasonChips=SEASONS.map(s=>`<span class="chip ${outfitSeason===s?'on':'off'}" onclick="setOutfitSeason('${s}')">${s}</span>`).join('');
  let resultHtml='';
  if(currentOutfit){
    const rows=Object.entries(currentOutfit).filter(([,v])=>v).map(([cat,item])=>{
      const imgHtml=item.image?`<img src="${item.image}" class="o-img" alt=""/>`:`<div class="o-ph">${icon(item.category,24)}</div>`;
      return `<div class="outfit-row">${imgHtml}<div style="flex:1"><div class="o-cat">${cat}</div><div class="o-name">${item.name}</div><div class="o-sub">${(item.styles||[]).join('、')} · ${(item.seasons||[]).join('、')}</div></div><div class="o-dot" style="background:${COLOR_HEX[item.color]}"></div></div>`;
    }).join('');
    resultHtml=`<div class="result-header"><div class="result-title">今日穿搭推薦</div><button class="swap-btn" onclick="generateOutfit()">換一套</button></div><div class="outfit-rows fade">${rows}</div>`;
  } else {
    resultHtml=`<div class="empty-state"><div class="empty-icon">${icon('洋裝',64)}</div><div class="empty-title">設定偏好後點擊搭配</div><div class="empty-sub">我幫你從衣櫃裡選出最棒的造型</div></div>`;
  }
  el.innerHTML=`<div class="outfit-pref">
    <div class="outfit-pref-title">設定今日偏好</div>
    <div class="pref-row"><label class="section-label">風格 <span>（可多選）</span></label><div class="chips">${styleChips}</div></div>
    <div class="pref-row"><label class="section-label">季節</label><div class="chips">${seasonChips}</div></div>
    <button class="match-btn" onclick="generateOutfit()">幫我搭配！</button>
  </div>${resultHtml}`;
}

// Actions
function setFilter(cat){filterCat=cat;selectedId=null;renderWardrobe();}
function selectItem(id){selectedId=selectedId===id?null:id;renderWardrobe();}
function deleteItem(id){clothes=clothes.filter(c=>c.id!==id);selectedId=null;save();render();}

function triggerCardUpload(id){
  window._editingId=id;
  document.getElementById('file-edit').click();
}
function onEditFileChange(e){
  const file=e.target.files[0];if(!file)return;
  const id=window._editingId;
  readFile(file,url=>{
    clothes=clothes.map(c=>c.id===id?{...c,image:url}:c);
    if(selectedId===id){const sel=clothes.find(c=>c.id===id);if(sel)selectedId=sel.id;}
    save();render();
  });
  e.target.value='';
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-wardrobe').style.display=tab==='wardrobe'?'':'none';
  document.getElementById('tab-outfit').style.display=tab==='outfit'?'':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  render();
}

// Outfit
function toggleOutfitStyle(s){
  outfitStyles=outfitStyles.includes(s)?outfitStyles.filter(x=>x!==s):[...outfitStyles,s];
  renderOutfit();
}
function setOutfitSeason(s){outfitSeason=s;renderOutfit();}
function generateOutfit(){
  const pick=cat=>{
    const pool=clothes.filter(c=>{
      const ss=c.seasons||[c.season||'四季'];
      return c.category===cat&&(ss.includes(outfitSeason)||ss.includes('四季'));
    });
    const styled=outfitStyles.length?pool.filter(c=>(c.styles||[c.style||'休閒']).some(s=>outfitStyles.includes(s))):[];
    const arr=styled.length?styled:pool;
    return arr.length?arr[Math.floor(Math.random()*arr.length)]:null;
  };
  const useDress=clothes.filter(c=>c.category==='洋裝').length>0&&Math.random()>.5;
  const r={};
  if(useDress){const d=pick('洋裝');if(d)r['洋裝']=d;}
  else{const t=pick('上衣');if(t)r['上衣']=t;const b=pick('下裝');if(b)r['下裝']=b;}
  const o=pick('外套');if(o&&Math.random()>.4)r['外套']=o;
  const s=pick('鞋子');if(s)r['鞋子']=s;
  const a=pick('配件');if(a&&Math.random()>.3)r['配件']=a;
  currentOutfit=r;
  renderOutfit();
}

// Modal
function openModal(){
  newItem={name:'',category:'上衣',color:'白',seasons:[],styles:[],image:null};
  renderModal();
  document.getElementById('modal').style.display='flex';
}
function closeModal(e){if(e.target===document.getElementById('modal'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal').style.display='none';}

function renderModal(){
  document.getElementById('new-name').value='';
  document.getElementById('new-color-label').textContent=newItem.color;
  // Cat chips
  document.getElementById('new-cat-chips').innerHTML=CATS.map(c=>`<span class="chip ${newItem.category===c?'on':'off'}" onclick="setNewCat('${c}')">${c}</span>`).join('');
  // Color dots
  document.getElementById('new-color-dots').innerHTML=COLORS.map(c=>`<div class="cdot${newItem.color===c?' sel':''}" style="background:${COLOR_HEX[c]}" title="${c}" onclick="setNewColor('${c}')"></div>`).join('');
  // Season chips
  document.getElementById('new-season-chips').innerHTML=SEASONS.map(s=>{const a=newItem.seasons.includes(s);return`<span class="chip ${a?'on':'off'}" onclick="toggleNewSeason('${s}')">${a?'✓ ':''}${s}</span>`;}).join('');
  // Style chips
  document.getElementById('new-style-chips').innerHTML=STYLES.map(s=>{const a=newItem.styles.includes(s);return`<span class="chip ${a?'on':'off'}" onclick="toggleNewStyle('${s}')">${a?'✓ ':''}${s}</span>`;}).join('');
  // Upload
  renderUploadArea();
}
function renderUploadArea(){
  const area=document.getElementById('upload-area');
  if(newItem.image){
    area.innerHTML=`<div class="preview-wrap"><img src="${newItem.image}"/><button class="preview-rm" onclick="clearNewImage()">✕</button><button class="preview-change" onclick="document.getElementById('file-new').click()">更換</button></div>`;
  } else {
    area.innerHTML=`<div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-new').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#a8d0f0" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><div class="upload-title">點擊或拖曳上傳照片</div><div class="upload-sub">支援 JPG、PNG、HEIC</div></div>`;
  }
}
function setNewCat(c){newItem.category=c;document.getElementById('new-cat-chips').innerHTML=CATS.map(x=>`<span class="chip ${newItem.category===x?'on':'off'}" onclick="setNewCat('${x}')">${x}</span>`).join('');}
function setNewColor(c){newItem.color=c;document.getElementById('new-color-label').textContent=c;document.getElementById('new-color-dots').innerHTML=COLORS.map(x=>`<div class="cdot${newItem.color===x?' sel':''}" style="background:${COLOR_HEX[x]}" title="${x}" onclick="setNewColor('${x}')"></div>`).join('');}
function toggleNewSeason(s){newItem.seasons=newItem.seasons.includes(s)?newItem.seasons.filter(x=>x!==s):[...newItem.seasons,s];document.getElementById('new-season-chips').innerHTML=SEASONS.map(x=>{const a=newItem.seasons.includes(x);return`<span class="chip ${a?'on':'off'}" onclick="toggleNewSeason('${x}')">${a?'✓ ':''}${x}</span>`;}).join('');}
function toggleNewStyle(s){newItem.styles=newItem.styles.includes(s)?newItem.styles.filter(x=>x!==s):[...newItem.styles,s];document.getElementById('new-style-chips').innerHTML=STYLES.map(x=>{const a=newItem.styles.includes(x);return`<span class="chip ${a?'on':'off'}" onclick="toggleNewStyle('${x}')">${a?'✓ ':''}${x}</span>`;}).join('');}
function clearNewImage(){newItem.image=null;renderUploadArea();}
function onNewFileChange(e){const f=e.target.files[0];if(!f)return;readFile(f,url=>{newItem.image=url;renderUploadArea();});e.target.value='';}
function onDragOver(e){e.preventDefault();document.getElementById('upload-zone')&&document.getElementById('upload-zone').classList.add('drag');}
function onDragLeave(){document.getElementById('upload-zone')&&document.getElementById('upload-zone').classList.remove('drag');}
function onDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)readFile(f,url=>{newItem.image=url;renderUploadArea();});}

function addItem(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){document.getElementById('new-name').focus();return;}
  clothes.push({id:nextId++,name,category:newItem.category,color:newItem.color,seasons:[...newItem.seasons],styles:[...newItem.styles],image:newItem.image});
  save();closeModalDirect();render();
}

function readFile(file,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);}

// Init
load();render();
</script>
</body>
</html>
